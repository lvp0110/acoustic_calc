# Эталонный server block для acoustic-calc (домен acousticcalc.constrtodo.ru).
#
# Использование на сервере:
#   sudo cp deploy/nginx/acoustic-calc.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/acoustic-calc.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS — общий wildcard-серт *.constrtodo.ru (тот же, что у partners/content):
#   /home/leonidl/certs/{fullchain,privkey}.pem

# HTTP → HTTPS
server {
    listen      80;
    listen [::]:80;
    server_name acousticcalc.constrtodo.ru;

    # ACME challenge для Let's Encrypt оставляем по HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name acousticcalc.constrtodo.ru;

    # TLS — wildcard *.constrtodo.ru (как у partners/content)
    ssl_certificate     /home/leonidl/certs/fullchain.pem;
    ssl_certificate_key /home/leonidl/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Заголовки безопасности
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    # Разрешаем встраивание в iframe только с constrtodo.ru и его поддоменов.
    # X-Frame-Options не ставим: ALLOW-FROM мёртв, а DENY/SAMEORIGIN конфликтуют
    # с frame-ancestors в старых браузерах.
    add_header Content-Security-Policy   "frame-ancestors 'self' https://constrtodo.ru https://*.constrtodo.ru" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Отдельные логи под этот проект
    access_log /var/log/nginx/acoustic-calc.access.log;
    error_log  /var/log/nginx/acoustic-calc.error.log warn;

    client_max_body_size 10m;

    location / {
        # Контейнер acoustic-calc слушает HTTP на 3003
        # (маппинг 127.0.0.1:3003->3000/tcp).
        proxy_pass http://127.0.0.1:3003;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout   60s;
        proxy_read_timeout   60s;
    }
}
